name: Build and Deploy Go Application

on:
  push:
    branches: [ "production" ]
  workflow_dispatch:

env:
  GO_VERSION: '1.23.4'
  PROJECT_NAME: 'http'
  BUILD_OUTPUT: 'out'
  EXECUTABLE_NAME: 'http.exe'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Clean and prepare output directory
      run: |
        if (Test-Path $env:BUILD_OUTPUT) {
          Remove-Item -Recurse -Force $env:BUILD_OUTPUT
        }
        New-Item -ItemType Directory -Path $env:BUILD_OUTPUT | Out-Null

    - name: Build application
      run: |
        $ldflags = "-s -w -X main.version=$env:GITHUB_SHA"
        go build -ldflags "$ldflags" -o "$env:BUILD_OUTPUT/$env:EXECUTABLE_NAME" ./cmd/main.go

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: ${{ env.BUILD_OUTPUT }}/${{ env.EXECUTABLE_NAME }}
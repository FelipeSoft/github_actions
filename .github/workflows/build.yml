name: Build Go Application (Windows)

on:
  push:
    branches: [ "production" ]
  pull_request:
    branches: [ "production" ]

env:
  GO_VERSION: '1.23.4'
  PROJECT_NAME: 'github_actions'
  BUILD_OUTPUT: 'bin'
  EXCLUDE_PATTERNS: '*.md,*.txt,testdata,temp,config.dev.*,out'

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go ${{ env.GO_VERSION }}
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        check-latest: true

    - name: Show Go version
      run: go version

    - name: Clean and exclude files
      run: |
        if (Test-Path out) {
          Remove-Item -Recurse -Force out
          Write-Output "Removed: /out directory"
        }

    - name: Get dependencies
      run: go mod download

    - name: Build application
      run: |
        if (-not (Test-Path $env:BUILD_OUTPUT)) {
          New-Item -ItemType Directory -Path $env:BUILD_OUTPUT | Out-Null
        }
        
        $ldflags = "-s -w -X main.version=$env:GITHUB_SHA"
        go build -ldflags "$ldflags" -o "$env:BUILD_OUTPUT/$env:PROJECT_NAME.exe" ./cmd/main.go

    - name: Run tests (opcional)
      run: go test -v ./...

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-windows
        path: ${{ env.BUILD_OUTPUT }}/${{ env.PROJECT_NAME }}.exe